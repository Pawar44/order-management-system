services:
  postgres:
    image: postgres:16
    container_name: order_management_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_management
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: order_management_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/order_management?schema=public"
      PORT: 5000
    depends_on:
      - postgres

volumes:
  postgres_data: